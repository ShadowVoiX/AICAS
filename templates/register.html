<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>iTa'LeEm Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #1aa6a6;
            --primary-dark: #148f8f;
            --bg: #f3f7f9;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(120deg, #0f4c81, #1aa6a6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 1100px;
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .left {
            padding: 48px;
            background: linear-gradient(160deg, #0f4c81, #136fa3);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left img {
            width: 64px;
            margin-bottom: 24px;
        }

        .right {
            padding: 48px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

      .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 24px;
        }
        .divider::before {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .reg{
            text-align: center;
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <div class="left">
            <img src="{{ url_for('static', filename='images/iium.png') }}">
            <h1>Welcome to iTa'LeEm</h1>
        </div>

        <div class="right">
            <h2 class="reg">Register</h2>
            <div class="divider"></div>

            <form id="registerForm">
                

                <label>Name</label>
                <input type="text" id="name" required>

                <label>Matric Number</label>
                <input type="text" id="matric" required>

                <label>Password</label>
                <input type="password" id="password" required>

                <button class="login-btn" type="submit">Register</button>

            </form>

            <div class="footer">
                <a href="/login">Already Have Account</a>
            </div>

        </div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const matric = document.getElementById("matric").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/register-student", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: name,
                    matric: matric,
                    password: password
                })
            });

            const data = await response.json();

            if (data.status === "success") {
                alert("Registration successful!");
                window.location.href = "/login";
            } else {
                alert(data.message);
            }
        });
    </script>

</body>

</html>
